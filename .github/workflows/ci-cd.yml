name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build fat JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: kkalscan-api-jar
          path: build/libs/*-all.jar

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_TTL_SECONDS: ${{ secrets.JWT_TTL_SECONDS }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
      OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
      OPENROUTER_APP_URL: ${{ secrets.OPENROUTER_APP_URL }}
      OPENROUTER_APP_NAME: ${{ secrets.OPENROUTER_APP_NAME }}
      VISION_MONTHLY_BUDGET_RUB: ${{ secrets.VISION_MONTHLY_BUDGET_RUB }}
      VISION_COST_PER_REQUEST_RUB: ${{ secrets.VISION_COST_PER_REQUEST_RUB }}
      TOCHKA_MERCHANT_ID: ${{ secrets.TOCHKA_MERCHANT_ID }}
      TOCHKA_SECRET_KEY: ${{ secrets.TOCHKA_SECRET_KEY }}
      TOCHKA_ACCESS_TOKEN: ${{ secrets.TOCHKA_ACCESS_TOKEN }}
      TOCHKA_CUSTOMER_CODE: ${{ secrets.TOCHKA_CUSTOMER_CODE }}
      TOCHKA_WEBHOOK_SECRET: ${{ secrets.TOCHKA_WEBHOOK_SECRET }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      VK_APP_ID: ${{ secrets.VK_APP_ID }}
      VK_SERVICE_TOKEN: ${{ secrets.VK_SERVICE_TOKEN }}
      PORT: ${{ secrets.PORT }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      BUG_REPORT_NOTIFY_TO: ${{ secrets.BUG_REPORT_NOTIFY_TO }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build fat JAR
        run: |
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon

      - name: Deploy to production
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${DEPLOY_HOST:-}" ] && missing+=("DEPLOY_HOST")
          [ -z "${DEPLOY_USER:-}" ] && missing+=("DEPLOY_USER")
          [ -z "${SSH_KEY:-}" ] && missing+=("DEPLOY_SSH_KEY")
          [ -z "${JWT_SECRET:-}" ] && missing+=("JWT_SECRET")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Deploy skipped — missing secrets: ${missing[*]}"
            echo "See docs/github-secrets.md"
            exit 0
          fi

          chmod +x scripts/generate-env.sh
          ./scripts/generate-env.sh > .env.production

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          REMOTE_PATH="${DEPLOY_PATH:-/opt/kkalscan}"
          JAR=$(ls build/libs/*-all.jar | head -1)
          cp "$JAR" app.jar

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            app.jar .env.production docker-compose.prod.yml Dockerfile.prod \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_PATH}/"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd ${REMOTE_PATH} && mv .env.production .env && \
            docker compose -f docker-compose.prod.yml down --remove-orphans || true && \
            for id in \$(docker ps -q --filter publish=8080); do docker stop \"\$id\" || true; done && \
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate"

          echo "Deployed to ${DEPLOY_HOST}:${REMOTE_PATH}"
