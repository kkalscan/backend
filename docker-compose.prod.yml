services:
  kkalscan-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: kkalscan-api:latest
    container_name: kkalscan-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - kkalscan-data:/data
    environment:
      LOG_DIR: /data/logs
    env_file:
      - .env

volumes:
  kkalscan-data:
